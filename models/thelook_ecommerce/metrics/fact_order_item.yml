version: 2

semantic_models: 
  - name: order_item_details
    defaults:
      agg_time_dimension: created_at
    description: "This is semantic model for order items."
    model: ref('fact_order_item')
    entities:
      - name: order_item_id
        type: primary
      - name: user_id
        type: foreign
      - name: order_id
        type: foreign
    dimensions:
      - name: product_category
        type: categorical
      - name: created_at
        type: time
        expr: cast(created_at as DATE)
        type_params:
          time_granularity: day
    measures:
      - name: order_value
        agg: sum
        expr: sale_price
      - name: order_cost
        agg: sum
        expr: product_cost

metrics:
  - name: total_revenue
    label: Total Revenue
    description: "Total revenue generated from orders"
    type: simple
    type_params:
      measure:
        name: order_value
  - name: total_cost
    label: Total Cost
    description: "Total cost of products in orders"
    type: simple
    type_params:
      measure:
        name: order_cost
  - name: profit
    label: Total profit
    description: "Total profit from orders"
    type: derived
    type_params:
      expr: total_revenue - total_cost
      metrics:
        - name: total_revenue
        - name: total_cost
