version: 2

models:
  - name: stg_events
    description: "Staging model for events data"
    columns:
      - name: event_id
        description: "Unique identifier for each event"
        data_tests:
          - unique
          - not_null
      - name: user_id
        description: "Identifier for the user associated with the event"
      - name: event_type
        description: "Type of the event (e.g., click, purchase)"
      - name: session_id
        description: "Identifier for the session during which the event occurred"
      - name: uri
        description: "Uniform Resource Identifier associated with the event"
      - name: traffic_source
        description: "Source of the traffic that led to the event"
      - name: browser
        description: "Browser used by the user during the event"
      - name: created_at
        description: "Timestamp when the event was created"