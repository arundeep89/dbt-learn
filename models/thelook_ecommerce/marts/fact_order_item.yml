version: 2

models:
  - name: fact_order_item
    description: "This table contains detailed information about each order, including product details"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - order_item_id
    columns:
      - name: order_id
        description: "Unique identifier for each order"
      - name: user_id
        description: "Unique identifier for each user associated with order id"
      - name: order_item_id
        description: "Unique identifier for each item in the order"
      - name: product_name
        description: "Name of the product included in the order"
      - name: product_category
        description: "Category of the product included in the order"
      - name: product_cost
        description: "Cost of the product at the time of the order"
      - name: sale_price
        description: "Sale price of the product at the time of the order"
      - name: created_at
        description: "Timestamp when the order item was created"
      - name: shipped_at
        description: "Timestamp when the order item was shipped"
      - name: delivered_at
        description: "Timestamp when the order item was delivered"
      - name: returned_at
        description: "Timestamp when the order item was returned (if applicable)"      
      - name: order_item_status
        description: "Current status of the order item"
        data_tests:
          - accepted_values:
              values: ['Complete', 'Shipped', 'Cancelled', 'Returned', 'Processing']

semantic_models: 
  - name: order_item_details
    description: "This is semantic model for order items."
    model: ref('fact_order_item')
    enabled: true
    entities:
      - name: order_item_id
        type: primary
      - name: user_id
        type: foreign
      - name: order_id
        type: foreign
    dimensions:
      - name: product_category
        type: categorical
      - name: created_at
        type: time
        description: "Timestamp when the order item was created (sourced from order items, not the parent order)"
        type_params:
          time_granularity: day
    measures:
      - name: order_value
        agg: sum
        expr: sale_price
      - name: order_cost
        agg: sum
        expr: product_cost

metrics:
  - name: total_revenue
    label: Total Revenue
    description: "Total revenue generated from orders"
    type: simple
    type_params:
      measure: order_value
  - name: total_cost
    label: Total Cost
    description: "Total cost of products in orders"
    type: simple
    type_params:
      measure: order_cost
  - name: profit
    label: Total profit
    description: "Total profit from orders"
    type: derived
    type_params:
      expr: total_revenue - total_cost


