name: dbt CI/CD
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DBT_PROJECT_DIR: ./
  DBT_PROFILES_DIR: ./
  DBT_GCP_JSON_KEY_FILE_LOCATION: /tmp/sa_key_file.json
  DBT_GCP_JSON_KEY_FILE: ${{ secrets.DBT_GCP_JSON_KEY_FILE }}

jobs:
  dbt_ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  

      - name: Set up Google Cloud authentication
        run: |
          echo "${{ secrets.DBT_GCP_JSON_KEY_FILE }}" > /tmp/sa_key_file.json
          echo "export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key_file.json" >> $GITHUB_ENV
      
      - name: Install dbt dependencies
        run: dbt deps

      - name: dbt run
        run: dbt run --target prod

      - name: Run dbt test
        run: dbt test --target prod
        